databaseChangeLog:
  # ============================================
  # GEOGRAPHY AND REFERENCE DATA
  # ============================================

  - changeSet:
      id: 0001-create-time_zone
      author: emerson
      description: Tabla de zonas horarias
      changes:
        - createTable:
            tableName: time_zone
            columns:
              - column:
                  name: time_zone_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: time_zone_name
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: utc_offset_minutes
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: time_zone
            columnNames: time_zone_name
            constraintName: uq_time_zone_name

  - changeSet:
      id: 0002-create-continent
      author: emerson
      description: Tabla de continentes
      changes:
        - createTable:
            tableName: continent
            columns:
              - column:
                  name: continent_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: continent_code
                  type: varchar(3)
                  constraints:
                    nullable: false
              - column:
                  name: continent_name
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: continent
            columnNames: continent_code
            constraintName: uq_continent_code
        - addUniqueConstraint:
            tableName: continent
            columnNames: continent_name
            constraintName: uq_continent_name

  - changeSet:
      id: 0003-create-country
      author: emerson
      description: Tabla de países
      changes:
        - createTable:
            tableName: country
            columns:
              - column:
                  name: country_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: continent_id
                  type: uuid
                  constraints:
                    nullable: false
                    references: continent(continent_id)
              - column:
                  name: iso_alpha2
                  type: varchar(2)
                  constraints:
                    nullable: false
              - column:
                  name: iso_alpha3
                  type: varchar(3)
                  constraints:
                    nullable: false
              - column:
                  name: country_name
                  type: varchar(128)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: country
            columnNames: iso_alpha2
            constraintName: uq_country_alpha2
        - addUniqueConstraint:
            tableName: country
            columnNames: iso_alpha3
            constraintName: uq_country_alpha3
        - addUniqueConstraint:
            tableName: country
            columnNames: country_name
            constraintName: uq_country_name

  - changeSet:
      id: 0004-create-state_province
      author: emerson
      description: Tabla de departamentos/estados/provincias
      changes:
        - createTable:
            tableName: state_province
            columns:
              - column:
                  name: state_province_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: country_id
                  type: uuid
                  constraints:
                    nullable: false
                    references: country(country_id)
              - column:
                  name: state_code
                  type: varchar(10)
              - column:
                  name: state_name
                  type: varchar(128)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: state_province
            columnNames: country_id,state_name
            constraintName: uq_state_country_name

  - changeSet:
      id: 0005-create-city
      author: emerson
      description: Tabla de ciudades
      changes:
        - createTable:
            tableName: city
            columns:
              - column:
                  name: city_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: state_province_id
                  type: uuid
                  constraints:
                    nullable: false
                    references: state_province(state_province_id)
              - column:
                  name: time_zone_id
                  type: uuid
                  constraints:
                    nullable: false
                    references: time_zone(time_zone_id)
              - column:
                  name: city_name
                  type: varchar(128)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: city
            columnNames: state_province_id,city_name
            constraintName: uq_city_state_name

  - changeSet:
      id: 0006-create-district
      author: emerson
      description: Tabla de distritos/barrios
      changes:
        - createTable:
            tableName: district
            columns:
              - column:
                  name: district_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: city_id
                  type: uuid
                  constraints:
                    nullable: false
                    references: city(city_id)
              - column:
                  name: district_name
                  type: varchar(128)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: district
            columnNames: city_id,district_name
            constraintName: uq_district_city_name

  - changeSet:
      id: 0007-create-address
      author: emerson
      description: Tabla de direcciones
      changes:
        - createTable:
            tableName: address
            columns:
              - column:
                  name: address_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: district_id
                  type: uuid
                  constraints:
                    nullable: false
                    references: district(district_id)
              - column:
                  name: address_line_1
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: address_line_2
                  type: varchar(200)
              - column:
                  name: postal_code
                  type: varchar(20)
              - column:
                  name: latitude
                  type: numeric(10,7)
              - column:
                  name: longitude
                  type: numeric(10,7)
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addCheckConstraint:
            tableName: address
            constraintName: ck_address_latitude
            condition: latitude IS NULL OR (latitude BETWEEN -90 AND 90)
        - addCheckConstraint:
            tableName: address
            constraintName: ck_address_longitude
            condition: longitude IS NULL OR (longitude BETWEEN -180 AND 180)

  - changeSet:
      id: 0008-create-currency
      author: emerson
      description: Tabla de monedas
      changes:
        - createTable:
            tableName: currency
            columns:
              - column:
                  name: currency_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: iso_currency_code
                  type: varchar(3)
                  constraints:
                    nullable: false
              - column:
                  name: currency_name
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: currency_symbol
                  type: varchar(8)
              - column:
                  name: minor_units
                  type: smallint
                  defaultValue: 2
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: currency
            columnNames: iso_currency_code
            constraintName: uq_currency_code
        - addUniqueConstraint:
            tableName: currency
            columnNames: currency_name
            constraintName: uq_currency_name
        - addCheckConstraint:
            tableName: currency
            constraintName: ck_currency_minor_units
            condition: minor_units BETWEEN 0 AND 4

  # ============================================
  # AIRLINE
  # ============================================

  - changeSet:
      id: 0009-create-airline
      author: emerson
      description: Tabla de aerolíneas
      changes:
        - createTable:
            tableName: airline
            columns:
              - column:
                  name: airline_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: home_country_id
                  type: uuid
                  constraints:
                    nullable: false
                    references: country(country_id)
              - column:
                  name: airline_code
                  type: varchar(10)
                  constraints:
                    nullable: false
              - column:
                  name: airline_name
                  type: varchar(150)
                  constraints:
                    nullable: false
              - column:
                  name: iata_code
                  type: varchar(2)
              - column:
                  name: icao_code
                  type: varchar(3)
              - column:
                  name: is_active
                  type: boolean
                  defaultValue: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: airline
            columnNames: airline_code
            constraintName: uq_airline_code
        - addUniqueConstraint:
            tableName: airline
            columnNames: airline_name
            constraintName: uq_airline_name
        - addUniqueConstraint:
            tableName: airline
            columnNames: iata_code
            constraintName: uq_airline_iata
        - addUniqueConstraint:
            tableName: airline
            columnNames: icao_code
            constraintName: uq_airline_icao
        - addCheckConstraint:
            tableName: airline
            constraintName: ck_airline_iata_len
            condition: iata_code IS NULL OR char_length(iata_code) = 2
        - addCheckConstraint:
            tableName: airline
            constraintName: ck_airline_icao_len
            condition: icao_code IS NULL OR char_length(icao_code) = 3

  # ============================================
  # IDENTITY
  # ============================================

  - changeSet:
      id: 0010-create-person_type
      author: emerson
      description: Tipos de persona
      changes:
        - createTable:
            tableName: person_type
            columns:
              - column:
                  name: person_type_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: type_code
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: type_name
                  type: varchar(80)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: person_type
            columnNames: type_code
            constraintName: uq_person_type_code
        - addUniqueConstraint:
            tableName: person_type
            columnNames: type_name
            constraintName: uq_person_type_name

  - changeSet:
      id: 0011-create-document_type
      author: emerson
      description: Tipos de documento
      changes:
        - createTable:
            tableName: document_type
            columns:
              - column:
                  name: document_type_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: type_code
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: type_name
                  type: varchar(80)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: document_type
            columnNames: type_code
            constraintName: uq_document_type_code
        - addUniqueConstraint:
            tableName: document_type
            columnNames: type_name
            constraintName: uq_document_type_name

  - changeSet:
      id: 0012-create-contact_type
      author: emerson
      description: Tipos de contacto
      changes:
        - createTable:
            tableName: contact_type
            columns:
              - column:
                  name: contact_type_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: type_code
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: type_name
                  type: varchar(80)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: contact_type
            columnNames: type_code
            constraintName: uq_contact_type_code
        - addUniqueConstraint:
            tableName: contact_type
            columnNames: type_name
            constraintName: uq_contact_type_name

  - changeSet:
      id: 0013-create-person
      author: emerson
      description: Tabla principal de personas
      changes:
        - createTable:
            tableName: person
            columns:
              - column:
                  name: person_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: person_type_id
                  type: uuid
                  constraints:
                    nullable: false
                    references: person_type(person_type_id)
              - column:
                  name: nationality_country_id
                  type: uuid
                  constraints:
                    references: country(country_id)
              - column:
                  name: first_name
                  type: varchar(80)
                  constraints:
                    nullable: false
              - column:
                  name: middle_name
                  type: varchar(80)
              - column:
                  name: last_name
                  type: varchar(80)
                  constraints:
                    nullable: false
              - column:
                  name: second_last_name
                  type: varchar(80)
              - column:
                  name: birth_date
                  type: date
              - column:
                  name: gender_code
                  type: varchar(1)
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addCheckConstraint:
            tableName: person
            constraintName: ck_person_gender
            condition: gender_code IS NULL OR gender_code IN ('F', 'M', 'X')

  - changeSet:
      id: 0014-create-person_document
      author: emerson
      description: Documentos de personas
      changes:
        - createTable:
            tableName: person_document
            columns:
              - column:
                  name: person_document_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: person_id
                  type: uuid
                  constraints:
                    nullable: false
                    references: person(person_id)
              - column:
                  name: document_type_id
                  type: uuid
                  constraints:
                    nullable: false
                    references: document_type(document_type_id)
              - column:
                  name: issuing_country_id
                  type: uuid
                  constraints:
                    references: country(country_id)
              - column:
                  name: document_number
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: issued_on
                  type: date
              - column:
                  name: expires_on
                  type: date
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: person_document
            columnNames: document_type_id,issuing_country_id,document_number
            constraintName: uq_person_document_natural
        - addCheckConstraint:
            tableName: person_document
            constraintName: ck_person_document_dates
            condition: expires_on IS NULL OR issued_on IS NULL OR expires_on >= issued_on

  - changeSet:
      id: 0015-create-person_contact
      author: emerson
      description: Contactos de personas
      changes:
        - createTable:
            tableName: person_contact
            columns:
              - column:
                  name: person_contact_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: person_id
                  type: uuid
                  constraints:
                    nullable: false
                    references: person(person_id)
              - column:
                  name: contact_type_id
                  type: uuid
                  constraints:
                    nullable: false
                    references: contact_type(contact_type_id)
              - column:
                  name: contact_value
                  type: varchar(180)
                  constraints:
                    nullable: false
              - column:
                  name: is_primary
                  type: boolean
                  defaultValue: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: person_contact
            columnNames: person_id,contact_type_id,contact_value
            constraintName: uq_person_contact_value

  # ============================================
  # SECURITY
  # ============================================

  - changeSet:
      id: 0016-create-user_status
      author: emerson
      description: Estados de usuario
      changes:
        - createTable:
            tableName: user_status
            columns:
              - column:
                  name: user_status_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: status_code
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: status_name
                  type: varchar(80)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: user_status
            columnNames: status_code
            constraintName: uq_user_status_code
        - addUniqueConstraint:
            tableName: user_status
            columnNames: status_name
            constraintName: uq_user_status_name

  - changeSet:
      id: 0017-create-security_role
      author: emerson
      description: Roles de seguridad
      changes:
        - createTable:
            tableName: security_role
            columns:
              - column:
                  name: security_role_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: role_code
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: role_name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: role_description
                  type: text
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: security_role
            columnNames: role_code
            constraintName: uq_security_role_code
        - addUniqueConstraint:
            tableName: security_role
            columnNames: role_name
            constraintName: uq_security_role_name

  - changeSet:
      id: 0018-create-security_permission
      author: emerson
      description: Permisos de seguridad
      changes:
        - createTable:
            tableName: security_permission
            columns:
              - column:
                  name: security_permission_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: permission_code
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: permission_name
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: permission_description
                  type: text
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: security_permission
            columnNames: permission_code
            constraintName: uq_security_permission_code
        - addUniqueConstraint:
            tableName: security_permission
            columnNames: permission_name
            constraintName: uq_security_permission_name

  - changeSet:
      id: 0019-create-user_account
      author: emerson
      description: Cuentas de usuario
      changes:
        - createTable:
            tableName: user_account
            columns:
              - column:
                  name: user_account_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: person_id
                  type: uuid
                  constraints:
                    nullable: false
                    references: person(person_id)
              - column:
                  name: user_status_id
                  type: uuid
                  constraints:
                    nullable: false
                    references: user_status(user_status_id)
              - column:
                  name: username
                  type: varchar(80)
                  constraints:
                    nullable: false
              - column:
                  name: password_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: last_login_at
                  type: timestamptz
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: user_account
            columnNames: person_id
            constraintName: uq_user_account_person
        - addUniqueConstraint:
